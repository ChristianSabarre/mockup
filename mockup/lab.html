<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>VitalPass — Lab</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { theme:{ extend:{ colors:{ brand:{
      50:"#ecfdf5",100:"#d1fae5",200:"#a7f3d0",300:"#6ee7b7",400:"#34d399",
      500:"#10b981",600:"#059669",700:"#047857",800:"#065f46",900:"#064e3b"
    }}}}};
  </script>

  <link rel="stylesheet" href="./lab.css"/>
</head>
<body class="bg-white text-slate-900">
<header class="sticky top-0 z-40 bg-white/90 backdrop-blur border-b border-slate-200">
  <div class="mx-auto max-w-7xl px-4 py-3 flex items-center justify-between">
    <div class="flex items-center gap-3">
      <div class="h-10 w-10 rounded-2xl bg-brand-600 grid place-items-center">
        <span class="text-white font-black">VP</span>
      </div>
      <div class="leading-tight">
        <div class="font-extrabold">Laboratory</div>
        <div class="text-xs text-slate-500">QR Scan • Orders • Container IDs • Results • Release</div>
      </div>
    </div>
    <div class="flex items-center gap-2">
      <select id="purpose" class="chip">
        <option value="treatment">Purpose: Treatment</option>
        <option value="operations">Purpose: Operations</option>
        <option value="other">Purpose: Other</option>
      </select>
      <span class="badge">LAB</span>
    </div>
  </div>
</header>

<div class="mx-auto max-w-7xl px-4 py-6 grid grid-cols-12 gap-5">
  <aside class="col-span-12 lg:col-span-3">
    <div class="panel">
      <div class="panelHead bg-gradient-to-br from-brand-50 to-white">
        <div class="font-extrabold">Lab flow</div>
        <div class="text-xs text-slate-500 mt-1">Order → Container → Result → Release</div>
      </div>
      <nav class="p-2">
        <button class="navItem active" data-view="scan">Scan QR</button>
        <button class="navItem" data-view="order">Orders</button>
        <button class="navItem" data-view="results">Results</button>
      </nav>
    </div>

    <div class="panel mt-5">
      <div class="panelHead">
        <div class="font-extrabold">ERD mapping</div>
        <div class="text-xs text-slate-500 mt-1">lab_orders, specimen_containers, lab_results, station_transactions</div>
      </div>
      <div class="p-4 text-sm text-slate-700">
        Lab assigns container numbers and releases results tied to the session order.
      </div>
    </div>
  </aside>

  <main class="col-span-12 lg:col-span-9 space-y-5">
    <section id="view"></section>
    <div id="toast" class="toast hidden"></div>
  </main>
</div>

<script src="./lab.js"></script>
</body>
</html>
